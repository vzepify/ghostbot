<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoBot — about</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
  :root {
    --bg: #0d0d0f; --surface: #141416; --surface2: #1c1c20;
    --border: #2a2a30; --accent: #9f6ef5; --accent2: #f56ef5;
    --green: #6ef5a0; --text: #e8e8f0; --muted: #6a6a7a;
    --mono: 'JetBrains Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.15; pointer-events: none; z-index: 0; }

  nav { position: sticky; top: 0; z-index: 20; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; text-decoration: none; color: var(--text); }
  .nav-brand span { font-size: 22px; }
  .nav-links { display: flex; align-items: center; gap: 6px; }
  .nav-link { font-family: var(--mono); font-size: 12px; color: var(--muted); text-decoration: none; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); transition: all 0.15s; }
  .nav-link:hover, .nav-link.active { border-color: var(--accent); color: var(--accent); background: rgba(159,110,245,0.06); }

  .layout { display: flex; flex: 1; position: relative; z-index: 1; }

  /* Sidebar TOC */
  .toc { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); position: sticky; top: 60px; height: calc(100vh - 60px); overflow-y: auto; padding: 24px 0; }
  .toc-title { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; padding: 0 20px 12px; }
  .toc-link { display: block; font-family: var(--mono); font-size: 12px; color: var(--muted); text-decoration: none; padding: 6px 20px; border-left: 2px solid transparent; transition: all 0.12s; }
  .toc-link:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .toc-link.active { color: var(--accent); border-left-color: var(--accent); background: rgba(159,110,245,0.06); }
  .toc-link.h3 { padding-left: 32px; font-size: 11px; }

  /* Content */
  .content { flex: 1; min-width: 0; padding: 48px 56px; max-width: 860px; }

  /* Markdown styles */
  .content h1 { font-size: 32px; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
  .content h2 { font-size: 20px; font-weight: 700; color: var(--text); margin: 40px 0 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .content h3 { font-size: 16px; font-weight: 600; color: var(--accent); margin: 24px 0 8px; }
  .content p { font-family: var(--mono); font-size: 13px; color: #b0b0c0; line-height: 1.8; margin-bottom: 14px; }
  .content a { color: var(--accent); text-decoration: none; }
  .content a:hover { text-decoration: underline; }
  .content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  .content ul, .content ol { font-family: var(--mono); font-size: 13px; color: #b0b0c0; line-height: 1.8; padding-left: 20px; margin-bottom: 14px; }
  .content li { margin-bottom: 4px; }
  .content strong { color: var(--text); font-weight: 700; }
  .content code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-family: var(--mono); font-size: 12px; color: var(--accent); }
  .content pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; overflow-x: auto; margin-bottom: 16px; }
  .content pre code { background: none; border: none; padding: 0; color: var(--text); font-size: 13px; }
  .content blockquote { border-left: 3px solid var(--accent); padding: 10px 16px; background: rgba(159,110,245,0.06); border-radius: 0 8px 8px 0; margin-bottom: 14px; }
  .content blockquote p { margin: 0; color: var(--muted); }
  .content table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-family: var(--mono); font-size: 12px; }
  .content th { background: var(--surface2); color: var(--text); font-weight: 700; padding: 10px 14px; text-align: left; border: 1px solid var(--border); }
  .content td { padding: 9px 14px; border: 1px solid var(--border); color: #b0b0c0; }
  .content tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Badges */
  .content img[src*="shields.io"] { display: inline; vertical-align: middle; margin: 2px 2px; }

  /* Center align for p align=center */
  .content p[align="center"] { text-align: center; }

  .loading { text-align: center; padding: 80px; font-family: var(--mono); color: var(--muted); }

  @media (max-width: 768px) {
    .toc { display: none; }
    .content { padding: 24px 20px; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand"><span>⚡</span> NeoBot</a>
  <div class="nav-links">
    <a href="/docs" class="nav-link active" id="readmeTab" onclick="loadDoc('readme')">README</a>
    <a href="/faq" class="nav-link" id="faqTab" onclick="loadDoc('faq'); return false;">FAQ</a>
    <a href="https://neobotxyz.up.railway.app/dashboard" class="nav-link" style="border-color:var(--accent);color:var(--accent);">Dashboard →</a>
  </div>
</nav>

<div class="layout">
  <aside class="toc" id="toc">
    <div class="toc-title">On this page</div>
    <div id="tocLinks"></div>
  </aside>
  <div class="content" id="content">
    <div class="loading">Loading...</div>
  </div>
</div>

<script>
  const docs = {
    readme: '/README.md',
    faq: '/FAQ.md'
  };

  let currentDoc = 'readme';

  // Check URL
  if (location.pathname === '/faq') currentDoc = 'faq';

  marked.setOptions({
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
      return hljs.highlightAuto(code).value;
    }
  });

  async function loadDoc(name) {
    currentDoc = name;
    document.getElementById('readmeTab').classList.toggle('active', name === 'readme');
    document.getElementById('faqTab').classList.toggle('active', name === 'faq');
    document.getElementById('content').innerHTML = '<div class="loading">Loading...</div>';

    const res = await fetch(docs[name]);
    const text = await res.text();
    const html = marked.parse(text);
    document.getElementById('content').innerHTML = html;

    // Syntax highlight
    document.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));

    // Build TOC
    buildTOC();

    // Update URL
    history.pushState({}, '', name === 'readme' ? '/docs' : '/faq');
  }

  function buildTOC() {
    const headings = document.querySelectorAll('#content h2, #content h3');
    const toc = document.getElementById('tocLinks');
    toc.innerHTML = '';
    headings.forEach(h => {
      if (!h.id) h.id = h.textContent.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.className = 'toc-link' + (h.tagName === 'H3' ? ' h3' : '');
      a.textContent = h.textContent;
      a.onclick = () => {
        document.querySelectorAll('.toc-link').forEach(l => l.classList.remove('active'));
        a.classList.add('active');
      };
      toc.appendChild(a);
    });
  }

  // Intersection observer for active TOC item
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        document.querySelectorAll('.toc-link').forEach(l => {
          l.classList.toggle('active', l.getAttribute('href') === '#' + id);
        });
      }
    });
  }, { rootMargin: '-60px 0px -80% 0px' });

  setTimeout(() => {
    document.querySelectorAll('#content h2, #content h3').forEach(h => observer.observe(h));
  }, 500);

  loadDoc(currentDoc);
</script>
</body>
</html>
