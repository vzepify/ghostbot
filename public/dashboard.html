<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeoBot — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f; --surface: #141416; --surface2: #1c1c20;
    --border: #2a2a30; --accent: #9f6ef5; --accent2: #f56ef5;
    --green: #6ef5a0; --red: #f56e6e; --text: #e8e8f0; --muted: #6a6a7a;
    --mono: 'JetBrains Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px; opacity: 0.2; pointer-events: none; z-index: 0;
  }

  nav {
    position: relative; z-index: 10;
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; }
  .nav-brand span { font-size: 22px; }
  .nav-right { display: flex; align-items: center; gap: 16px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); }
  .username { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .btn-sm {
    font-family: var(--sans); font-weight: 600; font-size: 12px;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--muted); transition: all 0.15s; text-decoration: none;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  .container { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

  .status-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px 24px; margin-bottom: 28px;
    display: flex; align-items: center; justify-content: space-between;
    animation: fadeDown 0.4s ease both;
  }
  .status-left { display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); flex-shrink: 0; }
  .status-dot.inactive { background: var(--muted); box-shadow: none; }
  .status-text { font-family: var(--mono); font-size: 13px; }
  .status-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }

  .btn { font-family: var(--sans); font-weight: 600; font-size: 13px; border: none; border-radius: 8px; padding: 8px 18px; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #b385ff; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger-ghost { background: transparent; color: var(--red); border: 1px solid transparent; padding: 6px 10px; font-size: 16px; }
  .btn-danger-ghost:hover { background: rgba(245,110,110,0.1); border-color: var(--red); }

  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 20px; animation: fadeDown 0.4s 0.1s ease both; }
  .section-title { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

  .commands-ref { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .cmd-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
  .cmd-chip .cmd { font-family: var(--mono); font-size: 12px; color: var(--accent); font-weight: 600; }
  .cmd-chip .desc { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 3px; }

  .form-row { display: grid; grid-template-columns: 150px 1fr 130px auto; gap: 8px; align-items: end; margin-bottom: 16px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  input, select { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--mono); font-size: 13px; padding: 9px 12px; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  select option { background: var(--surface2); }

  .btn-add { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-family: var(--sans); font-weight: 700; font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.15s; align-self: flex-end; }
  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }

  .command-list { display: flex; flex-direction: column; gap: 6px; }
  .command-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; overflow: hidden; transition: border-color 0.15s; }
  .command-card:hover { border-color: #3a3a45; }
  .command-card.editing { border-color: var(--accent); }
  .card-main { display: grid; grid-template-columns: 140px 1fr 110px auto auto; gap: 0; align-items: stretch; }
  .card-cell { padding: 12px 14px; border-right: 1px solid var(--border); display: flex; align-items: center; }
  .card-cell:last-child { border-right: none; gap: 6px; }
  .cmd-name { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); }
  .cmd-response { font-family: var(--mono); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .perm-badge { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .perm-everyone { background: rgba(110,245,160,0.12); color: var(--green); }
  .perm-mods { background: rgba(159,110,245,0.15); color: var(--accent); }
  .perm-broadcaster { background: rgba(245,110,245,0.12); color: var(--accent2); }
  .card-edit { background: #18181c; padding: 14px; border-top: 1px solid var(--border); display: none; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
  .card-edit.open { display: grid; }
  .edit-fields { display: grid; grid-template-columns: 140px 1fr 130px; gap: 8px; }
  .empty { text-align: center; padding: 40px; color: var(--muted); font-family: var(--mono); font-size: 13px; border: 1px dashed var(--border); border-radius: 10px; }

  .toggle-switch { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 20px; cursor: pointer; transition: background 0.2s; }
  .toggle-track::after { content: ''; position: absolute; left: 3px; top: 3px; width: 12px; height: 12px; border-radius: 50%; background: var(--muted); transition: all 0.2s; }
  .toggle-switch input:checked + .toggle-track { background: var(--accent); }
  .toggle-switch input:checked + .toggle-track::after { left: 19px; background: #fff; }

  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 18px; font-family: var(--mono); font-size: 13px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 100; display: flex; align-items: center; gap: 8px; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .save-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .save-bar-left { display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .save-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); transition: background 0.3s; }
  .save-dot.dirty { background: #f5a56e; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<nav>
  <div class="nav-brand"><span></span> NeoBot</div>
  <div class="nav-right">
    <img class="avatar" id="navAvatar" src="" alt="">
    <span class="username" id="navUsername">loading...</span>
    <a href="/auth/logout" class="btn-sm">Log out</a>
  </div>
</nav>

<div class="container">

  <div class="status-card">
    <div class="status-left">
      <div class="status-dot" id="statusDot"></div>
      <div>
        <div class="status-text" id="statusText">Bot is active in your channel</div>
        <div class="status-sub" id="statusSub"></div>
      </div>
    </div>
    <button class="btn btn-ghost" id="toggleBtn" onclick="toggleBot()">Deactivate</button>
  </div>

  <div class="section">
    <div class="section-title">// Built-in commands</div>
    <div class="commands-ref">
      <div class="cmd-chip"><div class="cmd">!title &lt;text&gt;</div><div class="desc">Update stream title</div></div>
      <div class="cmd-chip"><div class="cmd">!game &lt;name&gt;</div><div class="desc">Update category</div></div>
      <div class="cmd-chip"><div class="cmd">!uptime</div><div class="desc">Show stream duration</div></div>
      <div class="cmd-chip"><div class="cmd">!shoutout &lt;user&gt;</div><div class="desc">Shout out a streamer</div></div>
      <div class="cmd-chip"><div class="cmd">!commands</div><div class="desc">List all commands</div></div>
      <div class="cmd-chip"><div class="cmd">!discord</div><div class="desc">Post Discord link</div></div>
    </div>
  </div>

  <div class="section" style="animation-delay:0.15s;">
    <div class="save-bar">
      <div>
        <div class="section-title" style="margin-bottom:0;">// Custom commands</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="save-bar-left"><div class="save-dot" id="saveDot"></div><span id="saveText">Saved</span></div>
        <button class="btn btn-primary" onclick="saveCommands()">Save Changes</button>
      </div>
    </div>

    <div class="form-row" style="margin-top:14px;">
      <div class="field"><label>Command</label><input type="text" id="newCmd" placeholder="!discord" /></div>
      <div class="field"><label>Response</label><input type="text" id="newResp" placeholder="Join us at discord.gg/..." /></div>
      <div class="field"><label>Who can use</label>
        <select id="newPerm">
          <option value="everyone">Everyone</option>
          <option value="mods">Mods+</option>
          <option value="broadcaster">Broadcaster only</option>
        </select>
      </div>
      <button class="btn-add" onclick="addCommand()">+ Add</button>
    </div>

    <div class="command-list" id="commandList"></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastIcon">✅</span><span id="toastMsg"></span></div>

<script>
  let userData = null;
  let commands = [];
  let dirty = false;

  async function init() {
    const res = await fetch('/api/me');
    if (!res.ok) { location.href = '/'; return; }
    userData = await res.json();
    commands = userData.commands || [];

    document.getElementById('navAvatar').src = userData.profileImage;
    document.getElementById('navUsername').textContent = userData.displayName;

    const since = new Date(userData.joinedAt).toLocaleDateString();
    document.getElementById('statusSub').textContent = `Connected since ${since} · #${userData.login}`;

    updateStatusUI();
    renderCommands();
  }

  function updateStatusUI() {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    const btn = document.getElementById('toggleBtn');
    if (userData.active) {
      dot.classList.remove('inactive');
      text.textContent = 'Bot is active in your channel';
      btn.textContent = 'Deactivate';
      btn.className = 'btn btn-ghost';
    } else {
      dot.classList.add('inactive');
      text.textContent = 'Bot is not active';
      btn.textContent = 'Activate';
      btn.className = 'btn btn-primary';
    }
  }

  async function toggleBot() {
    const endpoint = userData.active ? '/api/deactivate' : '/api/activate';
    await fetch(endpoint, { method: 'POST' });
    userData.active = !userData.active;
    updateStatusUI();
    showToast(userData.active ? '✅' : '⏹️', userData.active ? 'Bot activated' : 'Bot deactivated');
  }

  function setDirty(val) {
    dirty = val;
    document.getElementById('saveDot').classList.toggle('dirty', val);
    document.getElementById('saveText').textContent = val ? 'Unsaved changes' : 'Saved';
  }

  function renderCommands() {
    const list = document.getElementById('commandList');
    if (!commands.length) {
      list.innerHTML = '<div class="empty">No custom commands yet — add one above</div>';
      return;
    }
    list.innerHTML = commands.map((cmd, i) => `
      <div class="command-card" id="card-${i}">
        <div class="card-main">
          <div class="card-cell"><span class="cmd-name">${esc(cmd.command)}</span></div>
          <div class="card-cell" style="flex:1;"><span class="cmd-response">${esc(cmd.response)}</span></div>
          <div class="card-cell"><span class="perm-badge perm-${cmd.permission}">${permLabel(cmd.permission)}</span></div>
          <div class="card-cell">
            <label class="toggle-switch"><input type="checkbox" ${cmd.enabled !== false ? 'checked' : ''} onchange="toggleEnabled(${i},this.checked)"><span class="toggle-track"></span></label>
          </div>
          <div class="card-cell">
            <button class="btn btn-ghost" style="padding:5px 10px;font-size:12px;" onclick="toggleEdit(${i})">Edit</button>
            <button class="btn-danger-ghost btn" onclick="deleteCmd(${i})">×</button>
          </div>
        </div>
        <div class="card-edit" id="edit-${i}">
          <div class="edit-fields">
            <div class="field"><label>Command</label><input type="text" id="ec-${i}" value="${esc(cmd.command)}" /></div>
            <div class="field"><label>Response</label><input type="text" id="er-${i}" value="${esc(cmd.response)}" /></div>
            <div class="field"><label>Permission</label>
              <select id="ep-${i}">
                <option value="everyone" ${cmd.permission==='everyone'?'selected':''}>Everyone</option>
                <option value="mods" ${cmd.permission==='mods'?'selected':''}>Mods+</option>
                <option value="broadcaster" ${cmd.permission==='broadcaster'?'selected':''}>Broadcaster only</option>
              </select>
            </div>
          </div>
          <button class="btn btn-primary" onclick="saveEdit(${i})">Save</button>
        </div>
      </div>
    `).join('');
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function permLabel(p) { return {everyone:'Everyone',mods:'Mods+',broadcaster:'Broadcaster'}[p]||p; }

  function addCommand() {
    const cmd = document.getElementById('newCmd').value.trim();
    const resp = document.getElementById('newResp').value.trim();
    const perm = document.getElementById('newPerm').value;
    if (!cmd || !resp) { showToast('⚠️','Fill in both fields'); return; }
    const name = (cmd.startsWith('!') ? cmd : '!'+cmd).toLowerCase().replace(/\s+/g,'');
    if (commands.find(c => c.command === name)) { showToast('⚠️','Command already exists'); return; }
    commands.push({ command: name, response: resp, permission: perm, enabled: true });
    document.getElementById('newCmd').value = '';
    document.getElementById('newResp').value = '';
    setDirty(true);
    renderCommands();
    showToast('✅', `Added ${name}`);
  }

  function deleteCmd(i) {
    const name = commands[i].command;
    commands.splice(i, 1);
    setDirty(true);
    renderCommands();
    showToast('🗑️', `Deleted ${name}`);
  }

  function toggleEnabled(i, val) { commands[i].enabled = val; setDirty(true); }

  function toggleEdit(i) {
    const el = document.getElementById(`edit-${i}`);
    const card = document.getElementById(`card-${i}`);
    const isOpen = el.classList.contains('open');
    document.querySelectorAll('.card-edit.open').forEach(e => e.classList.remove('open'));
    document.querySelectorAll('.command-card.editing').forEach(e => e.classList.remove('editing'));
    if (!isOpen) { el.classList.add('open'); card.classList.add('editing'); }
  }

  function saveEdit(i) {
    const cmd = document.getElementById(`ec-${i}`).value.trim();
    const resp = document.getElementById(`er-${i}`).value.trim();
    const perm = document.getElementById(`ep-${i}`).value;
    if (!cmd || !resp) { showToast('⚠️','Fill in both fields'); return; }
    commands[i] = { ...commands[i], command: cmd.startsWith('!') ? cmd : '!'+cmd, response: resp, permission: perm };
    setDirty(true);
    renderCommands();
    showToast('✅', `Updated ${commands[i].command}`);
  }

  async function saveCommands() {
    await fetch('/api/commands', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ commands }) });
    setDirty(false);
    showToast('💾', 'Commands saved!');
  }

  let toastTimer;
  function showToast(icon, msg) {
    document.getElementById('toastIcon').textContent = icon;
    document.getElementById('toastMsg').textContent = msg;
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.getElementById('newResp').addEventListener('keydown', e => { if (e.key === 'Enter') addCommand(); });

  init();
</script>
</body>
</html>
